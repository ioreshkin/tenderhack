services:
  postgres:
    image: postgres:16-alpine
    container_name: tenderhack-postgres
    environment:
      POSTGRES_DB: tenderhack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenderhack"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenderhack-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tenderhack?sslmode=disable
      HTTP_ADDR: :8080
      DOCS_DIR: /app/generated
      PDF_BROWSER: /usr/bin/chromium
      AUTO_IMPORT: "1"
    ports:
      - "8080:8080"
    volumes:
      - ./generated:/app/generated

  import:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tenderhack?sslmode=disable
      DOCS_DIR: /app/generated
      PDF_BROWSER: /usr/bin/chromium
      AUTO_IMPORT: "0"
    volumes:
      - ./generated:/app/generated
    command: ["import"]

volumes:
  postgres-data:
